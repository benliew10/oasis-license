services:
  - type: web
    # Service URL must be ≤29 chars for anubis binary embed (https://oasis.onrender.com)
    name: oasis
    runtime: python
    plan: starter
    buildCommand: echo "stdlib only — no pip install"
    startCommand: python3 server.py --host 0.0.0.0
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: OASIS_PUBLIC_URL
        value: "https://oasismod.qzz.io"
